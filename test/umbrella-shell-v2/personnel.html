<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRELLA // USER REGISTRY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root {
  --red: #ff3333; --red-dk: #200606;
  --amber: #ffaa00; --ok: #00ff00;
  --bone: #d8d2c4; --bg: #020202;
  --panel-bg: rgba(10,10,10,0.94);
  --panel-edge: #333333; --text-dim: #808080;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--bone); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }
#bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: linear-gradient(rgba(255,51,51,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,51,51,0.045) 1px, transparent 1px);
  background-size: 34px 34px;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%);
}
#scanline { position: fixed; left: 0; right: 0; height: 140px; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, transparent, rgba(255,51,51,0.05), transparent); animation: sweep 8s linear infinite; }
@keyframes sweep { 0% { top: -140px; } 100% { top: 100vh; } }
#vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none; box-shadow: inset 0 0 220px rgba(0,0,0,0.85); }

.wrap { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); padding-bottom: 16px; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.brand { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 12px rgba(255,51,51,0.55); }
.brand span { color: var(--amber); }
.brand small { display: block; font-family: var(--font-mono); font-weight: 400; font-size: 0.62rem; letter-spacing: 2px; color: var(--text-dim); margin-top: 4px; }
.clearance { text-align: right; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; }
.clearance b { color: var(--red); }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--ok); margin-right:5px; box-shadow: 0 0 6px var(--ok); animation: blink 1.6s infinite; }
@keyframes blink { 50% { opacity: 0.25; } }

.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.toolbar input { flex: 1; min-width: 180px; background: rgba(255,255,255,0.02); border: 1px solid var(--panel-edge); color: var(--bone); padding: 8px 10px; font-family: var(--font-mono); font-size: 0.75rem; outline: none; }
.toolbar input:focus { border-color: var(--red); }
.tag-btn { border: 1px solid var(--panel-edge); background: rgba(255,51,51,0.03); color: var(--text-dim); font-size: 0.6rem; letter-spacing: 1px; padding: 8px 12px; cursor: pointer; font-family: var(--font-mono); }
.tag-btn:hover { border-color: var(--red); color: var(--red); }
.tag-btn.active { border-color: var(--red); color: var(--red); background: rgba(255,51,51,0.1); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.card { background: var(--panel-bg); border: 1px solid var(--panel-edge); clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%); display: flex; flex-direction: column; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
.card:hover { border-color: var(--red); box-shadow: 0 0 22px rgba(255,51,51,0.12); }
.card-header { background: linear-gradient(90deg, var(--red-dk), transparent); border-bottom: 1px solid var(--panel-edge); padding: 12px; display: flex; align-items: center; gap: 12px; }
.card-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--red-dk); border: 1px solid var(--red); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); color: var(--red); font-size: 1rem; flex-shrink: 0; }
.card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
.card-name { font-family: var(--font-display); font-size: 0.95rem; color: var(--bone); margin-bottom: 4px; letter-spacing: .5px; }
.card-role { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 10px; }
.card-meta { font-size: 0.60rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }
.card-meta b { color: var(--bone); font-weight: normal; }
.status-badge { display: inline-block; padding: 3px 8px; font-size: 0.55rem; letter-spacing: 1px; border: 1px solid currentColor; margin-right: 6px; margin-bottom: 6px; }
.status-active { color: var(--ok); }
.status-unverified { color: var(--amber); }
.status-missing { color: var(--red); }
.status-locked { color: #ff6600; }

.empty { color: #555; font-size: 0.75rem; grid-column: 1/-1; text-align: center; padding: 40px 0; }
footer { margin-top: 40px; text-align: center; font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; }
</style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanline"></div>
<div id="vignette"></div>

<div class="wrap">
  <header>
    <div class="brand">UMBRELLA<span>::</span>USER REGISTRY
      <small>REGISTRE DU PERSONNEL — FICHE D'ACCES EN TEMPS REEL</small>
    </div>
    <div class="clearance">
      <div><span class="dot"></span><b>CONNEXION SECURISEE</b></div>
      <div>ACCES NIVEAU 5 — <span id="stamp"></span></div>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="search" placeholder="rechercher un employe (nom, ID, role)...">
    <div class="tag-btn active" data-tag="ALL">TOUS</div>
    <div class="tag-btn" data-tag="ACTIVE">ACTIF</div>
    <div class="tag-btn" data-tag="UNVERIFIED">NON-VERIF</div>
    <div class="tag-btn" data-tag="MISSING">DISPARU</div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>UMBRELLA CORPORATION © — registre temps reel mis a jour toutes les 30 secondes</footer>
</div>

<script>
const PERSONNEL_DATA = [
  { id: "EMP-0941", name: "Dandrien Ihonty",  role: "Chief SysAdmin / Web Dev",      status: "ACTIVE",      clearance: 3, ip: "10.240.0.12", sent: 124 },
  { id: "EMP-1022", name: "Dr. Albert W.",     role: "Director of Bio-Research",       status: "UNVERIFIED",  clearance: 5, ip: "10.240.7.99", sent: 8   },
  { id: "EMP-4042", name: "Annette B.",         role: "Junior IT Technician",           status: "ACTIVE",      clearance: 1, ip: "10.240.2.41", sent: 45  },
  { id: "EMP-0099", name: "Dr. Marcus Birkin", role: "Viral Genetics — NIVEAU 5",      status: "MISSING",     clearance: 5, ip: "10.240.9.01", sent: 0   },
  { id: "EMP-0312", name: "Sgt. Klaus Renner", role: "Internal Security — Field Ops",  status: "ACTIVE",      clearance: 3, ip: "10.240.1.55", sent: 312 },
];

const grid = document.getElementById('grid');
const stamp = document.getElementById('stamp');
let activeTag = 'ALL';
let query = '';

function tickStamp() { stamp.textContent = new Date().toLocaleString('fr-FR'); }
setInterval(tickStamp, 1000); tickStamp();

function statusColor(status) {
  if (status === 'ACTIVE') return 'var(--ok)';
  if (status === 'UNVERIFIED') return 'var(--amber)';
  if (status === 'MISSING') return 'var(--red)';
  return 'var(--text-dim)';
}

function statusLabel(status) {
  if (status === 'ACTIVE') return 'ACTIF';
  if (status === 'UNVERIFIED') return 'NON-VERIFIE';
  if (status === 'MISSING') return 'DISPARU';
  return status;
}

function render() {
  grid.innerHTML = '';
  const filtered = PERSONNEL_DATA.filter(p => {
    const matchTag = activeTag === 'ALL' || p.status === activeTag;
    const q = query.toLowerCase();
    const matchQuery = !q || (p.name + p.id + p.role).toLowerCase().includes(q);
    return matchTag && matchQuery;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Aucun personnel ne correspond a ces criteres.</div>';
    return;
  }

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    const initials = p.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const statusCol = statusColor(p.status);
    
    card.innerHTML = `
      <div class="card-header">
        <div class="card-avatar" style="color: ${statusCol}; border-color: ${statusCol}; background: ${statusCol}22;">${initials}</div>
        <div style="flex: 1;">
          <div class="card-name">${p.name}</div>
          <div class="card-role">${p.role}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <b>ID:</b> ${p.id}<br>
          <b>CLEARANCE:</b> NIVEAU ${p.clearance}<br>
          <b>IP:</b> <span style="color:#00aaff">${p.ip}</span><br>
          <b>DATA TX:</b> ${p.sent} KB
        </div>
        <div style="margin-top: auto;">
          <span class="status-badge status-${p.status.toLowerCase()}" style="color: ${statusCol}; border-color: ${statusCol}">${statusLabel(p.status)}</span>
          <span class="status-badge" style="color: #666; border-color: #333">PING: ${p.status === 'ACTIVE' ? Math.floor(15 + Math.random() * 25) + 'ms' : '---'}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTag = btn.dataset.tag;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });

render();
</script>
</body>
</html>
