<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRELLA // NETWORK SCAN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root {
  --red: #ff3333; --red-dk: #200606;
  --amber: #ffaa00; --ok: #00ff00;
  --cyan: #00ffff;
  --bone: #d8d2c4; --bg: #020202;
  --panel-bg: rgba(10,10,10,0.94);
  --panel-edge: #333333; --text-dim: #808080;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--bone); font-family: var(--font-mono); min-height: 100vh; overflow: hidden; }

#bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,51,51,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,51,51,0.045) 1px, transparent 1px); background-size: 34px 34px; mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%); }
#scanline { position: fixed; left: 0; right: 0; height: 140px; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, transparent, rgba(255,51,51,0.05), transparent); animation: sweep 8s linear infinite; }
@keyframes sweep { 0% { top: -140px; } 100% { top: 100vh; } }
#vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none; box-shadow: inset 0 0 220px rgba(0,0,0,0.85); }

.container { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; flex-direction: column; }

header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); padding: 12px 20px; background: linear-gradient(90deg, rgba(255,51,51,0.1), transparent); }
.brand { font-family: var(--font-display); font-weight: 900; font-size: 0.9rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 12px rgba(255,51,51,0.55); }
.brand span { color: var(--cyan); }
.stats { display: flex; gap: 20px; font-size: 0.65rem; color: var(--text-dim); }

.main { display: flex; flex: 1; padding: 12px; gap: 12px; overflow: hidden; }

.panel { background: var(--panel-bg); border: 1px solid var(--red); clip-path: polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%); display: flex; flex-direction: column; }
.panel-title { background: linear-gradient(90deg, var(--red-dk), transparent); border-bottom: 1px solid var(--panel-edge); padding: 8px 12px; font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 2px; color: var(--red); }
.panel-body { padding: 12px; overflow-y: auto; flex: 1; }

.node-item { background: rgba(0,255,0,0.05); border: 1px solid var(--panel-edge); padding: 10px; margin-bottom: 8px; clip-path: polygon(0 4px, 4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%); }
.node-online { border-left: 3px solid var(--ok); background: rgba(0,255,0,0.08); }
.node-offline { border-left: 3px solid var(--red); background: rgba(255,51,51,0.08); }
.node-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.node-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
.node-status.online { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
.node-status.offline { background: var(--red); }
.node-info { font-size: 0.70rem; color: var(--bone); font-weight: bold; }
.node-meta { font-size: 0.60rem; color: var(--text-dim); margin-top: 4px; }

.network-visualization { display: flex; align-items: center; justify-content: center; position: relative; }
canvas { max-width: 100%; max-height: 100%; }

.node-count { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.count-box { background: rgba(0,255,0,0.05); border: 1px solid var(--panel-edge); padding: 8px; text-align: center; }
.count-label { font-size: 0.55rem; color: var(--text-dim); }
.count-value { font-size: 0.85rem; color: var(--ok); font-weight: bold; margin-top: 4px; }

.scan-controls { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--panel-edge); }
.btn { flex: 1; background: rgba(0,255,0,0.1); border: 1px solid var(--ok); color: var(--ok); padding: 8px; font-family: var(--font-mono); font-size: 0.65rem; cursor: pointer; transition: all 0.2s; }
.btn:hover { background: rgba(0,255,0,0.2); box-shadow: 0 0 10px rgba(0,255,0,0.3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
::-webkit-scrollbar-thumb { background: var(--ok); }
::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
</style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanline"></div>
<div id="vignette"></div>

<div class="container">
  <header>
    <div>
      <div class="brand">UMBRELLA<span>::</span>NETWORK SCAN
        <div style="font-size:0.55rem; letter-spacing:1px; color:var(--text-dim); margin-top:4px;">ANALYSE RESEAU — SURVEILLANCE APPAREILS CONNECTES</div>
      </div>
    </div>
    <div class="stats">
      <div>ACTIFS: <span id="stat-active" style="color:var(--ok)">0</span></div>
      <div>HORS-LIGNE: <span id="stat-offline" style="color:var(--red)">0</span></div>
      <div>TOTAL: <span id="stat-total" style="color:var(--cyan)">0</span></div>
      <div>TEMPS: <span id="stat-time" style="color:var(--amber)">--</span></div>
    </div>
  </header>

  <div class="main">
    <!-- LEFT: NODE LIST -->
    <div class="panel" style="flex:0 0 35%;">
      <div class="panel-title">🌐 NŒUDS RESEAU</div>
      <div class="panel-body" id="nodes-list"></div>
      
      <div class="scan-controls">
        <button class="btn" id="btn-scan">▶ ANALYSER</button>
        <button class="btn" id="btn-refresh">⟲ RAFRAICHIR</button>
      </div>
    </div>

    <!-- RIGHT: VISUALIZATION -->
    <div class="panel" style="flex:1;">
      <div class="panel-title">📊 VISUALISATION RESEAU</div>
      <div class="panel-body network-visualization">
        <canvas id="network-canvas" width="400" height="300"></canvas>
      </div>
      
      <div style="border-top:1px solid var(--panel-edge); padding:12px; background:rgba(0,255,0,0.03);">
        <div class="node-count" id="node-counts"></div>
      </div>
    </div>
  </div>
</div>

<script>
const NETWORK_NODES = [
  { ip: '10.240.0.1',  host: 'GATEWAY_MAIN',    type: 'ROUTER',   online: true },
  { ip: '10.240.0.12', host: 'ADMIN_DANDRIEN',  type: 'TERMINAL', online: true },
  { ip: '10.240.1.55', host: 'SEC_TERMINAL_K',  type: 'TERMINAL', online: true },
  { ip: '10.240.2.41', host: 'IT_ANNETTE',      type: 'TERMINAL', online: true },
  { ip: '10.240.7.99', host: 'BIO_RESEARCH_SRV',type: 'SERVER',   online: true },
  { ip: '10.240.8.00', host: 'UNKNOWN_DEVICE',  type: '???',      online: false },
  { ip: '10.240.9.01', host: 'DR_BIRKIN_TERM',  type: 'TERMINAL', online: false },
];

const nodesList = document.getElementById('nodes-list');
const nodesCounts = document.getElementById('node-counts');
const canvas = document.getElementById('network-canvas');
const ctx = canvas.getContext('2d');
const btnScan = document.getElementById('btn-scan');
const btnRefresh = document.getElementById('btn-refresh');

function renderNodesList() {
  nodesList.innerHTML = '';
  NETWORK_NODES.forEach(node => {
    const item = document.createElement('div');
    item.className = `node-item ${node.online ? 'node-online' : 'node-offline'}`;
    item.innerHTML = `
      <div class="node-header">
        <div style="display:flex; align-items:center;">
          <span class="node-status ${node.online ? 'online' : 'offline'}"></span>
          <div class="node-info">${node.host}</div>
        </div>
        <div class="node-meta" style="color:${node.online ? 'var(--ok)' : 'var(--red)'}">
          ${node.online ? '● ONLINE' : '● OFFLINE'}
        </div>
      </div>
      <div class="node-meta">${node.ip} — ${node.type}</div>
    `;
    nodesList.appendChild(item);
  });
  updateStats();
}

function updateStats() {
  const active = NETWORK_NODES.filter(n => n.online).length;
  const offline = NETWORK_NODES.filter(n => !n.online).length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-offline').textContent = offline;
  document.getElementById('stat-total').textContent = NETWORK_NODES.length;
  
  nodesCounts.innerHTML = `
    <div class="count-box">
      <div class="count-label">ACTIFS</div>
      <div class="count-value" style="color:var(--ok)">${active}</div>
    </div>
    <div class="count-box">
      <div class="count-label">HORS-LIGNE</div>
      <div class="count-value" style="color:var(--red)">${offline}</div>
    </div>
    <div class="count-box">
      <div class="count-label">TOTAL</div>
      <div class="count-value" style="color:var(--cyan)">${NETWORK_NODES.length}</div>
    </div>
    <div class="count-box">
      <div class="count-label">LATENCE</div>
      <div class="count-value" style="color:var(--amber)">${Math.floor(10 + Math.random() * 30)}ms</div>
    </div>
  `;
}

function drawNetwork() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw central node
  ctx.fillStyle = 'var(--ok)';
  ctx.fillStyle = '#00ff00';
  ctx.beginPath();
  ctx.arc(canvas.width / 2, canvas.height / 2, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#00ff00';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Draw peripheral nodes
  const nodeRadius = 80;
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  
  NETWORK_NODES.forEach((node, idx) => {
    const angle = (idx / NETWORK_NODES.length) * Math.PI * 2;
    const x = centerX + Math.cos(angle) * nodeRadius;
    const y = centerY + Math.sin(angle) * nodeRadius;
    
    const color = node.online ? '#00ff00' : '#ff3333';
    
    // Draw connection line
    ctx.strokeStyle = node.online ? 'rgba(0,255,0,0.3)' : 'rgba(255,51,51,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(x, y);
    ctx.stroke();
    
    // Draw node
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

function scan() {
  btnScan.disabled = true;
  
  let progress = 0;
  const scanInterval = setInterval(() => {
    progress += Math.random() * 20;
    if (progress > 100) {
      clearInterval(scanInterval);
      
      // Randomly change some nodes
      NETWORK_NODES.forEach(node => {
        if (Math.random() > 0.7) {
          node.online = !node.online;
        }
      });
      
      renderNodesList();
      drawNetwork();
      btnScan.disabled = false;
    }
    drawNetwork();
  }, 100);
}

function refresh() {
  renderNodesList();
  drawNetwork();
}

btnScan.addEventListener('click', scan);
btnRefresh.addEventListener('click', refresh);

// Initialize
renderNodesList();
drawNetwork();

// Update time
setInterval(() => {
  const now = new Date();
  document.getElementById('stat-time').textContent = now.toTimeString().split(' ')[0];
}, 1000);

// Periodically update network status
setInterval(() => {
  if (Math.random() > 0.8) {
    const randomNode = NETWORK_NODES[Math.floor(Math.random() * NETWORK_NODES.length)];
    randomNode.online = !randomNode.online;
    renderNodesList();
    drawNetwork();
  }
}, 5000);
</script>
</body>
</html>
