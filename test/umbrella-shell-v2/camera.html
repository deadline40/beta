<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRELLA // SURVEILLANCE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root {
  --red: #ff3333; --red-dk: #200606;
  --amber: #ffaa00; --ok: #00ff00;
  --bone: #d8d2c4; --bg: #020202;
  --panel-bg: rgba(10,10,10,0.94);
  --panel-edge: #333333; --text-dim: #808080;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--bone); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }
#bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,51,51,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,51,51,0.045) 1px, transparent 1px); background-size: 34px 34px; mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%); }
#scanline { position: fixed; left: 0; right: 0; height: 140px; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, transparent, rgba(255,51,51,0.05), transparent); animation: sweep 8s linear infinite; }
@keyframes sweep { 0% { top: -140px; } 100% { top: 100vh; } }
#vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none; box-shadow: inset 0 0 220px rgba(0,0,0,0.85); }

.wrap { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; padding: 32px 20px 80px; }

header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); padding-bottom: 16px; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.brand { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 12px rgba(255,51,51,0.55); }
.brand span { color: var(--amber); }
.brand small { display: block; font-family: var(--font-mono); font-weight: 400; font-size: 0.62rem; letter-spacing: 2px; color: var(--text-dim); margin-top: 4px; }
.clearance { text-align: right; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; }
.clearance b { color: var(--red); }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--ok); margin-right:5px; box-shadow: 0 0 6px var(--ok); animation: blink 1.6s infinite; }
@keyframes blink { 50% { opacity: 0.25; } }

.camera-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
.camera-feed { background: var(--panel-bg); border: 1px solid var(--red); clip-path: polygon(0 8px, 8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%); overflow: hidden; }
.camera-video { width: 100%; height: 240px; background: #000; display: block; object-fit: cover; }
.camera-label { background: linear-gradient(90deg, var(--red-dk), transparent); color: var(--red); padding: 8px 12px; font-size: 0.70rem; letter-spacing: 1px; font-family: var(--font-display); font-weight: 700; }
.camera-status { position: absolute; top: 10px; right: 10px; background: var(--red); color: #000; padding: 4px 8px; font-size: 0.60rem; letter-spacing: 1px; font-weight: bold; animation: blink 1s infinite; }

footer { margin-top: 40px; text-align: center; font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; }
</style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanline"></div>
<div id="vignette"></div>

<div class="wrap">
  <header>
    <div class="brand">UMBRELLA<span>::</span>SURVEILLANCE
      <small>SYSTEME DE VIDEO-SURVEILLANCE — 6 CAMERAS ACTIVES</small>
    </div>
    <div class="clearance">
      <div><span class="dot"></span><b>TRANSMISSION ACTIVE</b></div>
      <div>ACCES NIVEAU 5 — <span id="stamp"></span></div>
    </div>
  </header>

  <div class="camera-grid" id="grid"></div>

  <footer>UMBRELLA CORPORATION © — tous les flux sont enregistres localement</footer>
</div>

<script>
const FEEDS = [
  { label: 'CAM-01 // HALL', img: 'https://picsum.photos/seed/cam1/400/240' },
  { label: 'CAM-02 // LAB-3', video: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4' },
  { label: 'CAM-03 // SOUS-SOL', img: 'https://picsum.photos/seed/cam3/400/240' },
  { label: 'CAM-04 // QUARANTAINE', img: 'https://picsum.photos/seed/cam4/400/240' },
  { label: 'CAM-05 // PARKING', img: 'https://picsum.photos/seed/cam5/400/240' },
  { label: 'CAM-06 // TOIT', img: 'https://picsum.photos/seed/cam6/400/240' }
];

const grid = document.getElementById('grid');
const stamp = document.getElementById('stamp');

function tickStamp() { stamp.textContent = new Date().toLocaleString('fr-FR'); }
setInterval(tickStamp, 1000); tickStamp();

FEEDS.forEach((feed, idx) => {
  const feed_div = document.createElement('div');
  feed_div.className = 'camera-feed';
  feed_div.style.position = 'relative';
  
  const media = document.createElement(feed.video ? 'video' : 'img');
  media.className = 'camera-video';
  if (feed.video) {
    media.src = feed.video;
    media.autoplay = true;
    media.loop = true;
    media.muted = true;
    media.playsinline = true;
  } else {
    media.src = feed.img;
    media.alt = feed.label;
  }
  
  const label = document.createElement('div');
  label.className = 'camera-label';
  label.textContent = feed.label;
  
  const rec = document.createElement('div');
  rec.className = 'camera-status';
  rec.style.animation = `blink ${1 + Math.random() * 0.5}s infinite`;
  rec.textContent = '● REC';
  
  feed_div.appendChild(media);
  feed_div.appendChild(label);
  feed_div.appendChild(rec);
  grid.appendChild(feed_div);
});
</script>
</body>
</html>
