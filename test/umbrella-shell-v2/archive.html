<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRELLA // ARCHIVES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root {
  --red: #ff3333; --red-dk: #200606;
  --amber: #ffaa00; --ok: #00ff00;
  --bone: #d8d2c4; --bg: #020202;
  --panel-bg: rgba(10,10,10,0.94);
  --panel-edge: #333333; --text-dim: #808080;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--bone); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }
#bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,51,51,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,51,51,0.045) 1px, transparent 1px); background-size: 34px 34px; mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%); }
#scanline { position: fixed; left: 0; right: 0; height: 140px; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, transparent, rgba(255,51,51,0.05), transparent); animation: sweep 8s linear infinite; }
@keyframes sweep { 0% { top: -140px; } 100% { top: 100vh; } }
#vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none; box-shadow: inset 0 0 220px rgba(0,0,0,0.85); }

.wrap { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); padding-bottom: 16px; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.brand { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 12px rgba(255,51,51,0.55); }
.brand span { color: var(--amber); }
.brand small { display: block; font-family: var(--font-mono); font-weight: 400; font-size: 0.62rem; letter-spacing: 2px; color: var(--text-dim); margin-top: 4px; }
.clearance { text-align: right; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; }
.clearance b { color: var(--red); }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--ok); margin-right:5px; box-shadow: 0 0 6px var(--ok); animation: blink 1.6s infinite; }
@keyframes blink { 50% { opacity: 0.25; } }

.toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.toolbar input { flex: 1; min-width: 180px; background: rgba(255,255,255,0.02); border: 1px solid var(--panel-edge); color: var(--bone); padding: 8px 10px; font-family: var(--font-mono); font-size: 0.75rem; outline: none; }
.toolbar input:focus { border-color: var(--red); }
.tag-btn { border: 1px solid var(--panel-edge); background: rgba(255,51,51,0.03); color: var(--text-dim); font-size: 0.6rem; letter-spacing: 1px; padding: 8px 12px; cursor: pointer; font-family: var(--font-mono); }
.tag-btn:hover { border-color: var(--red); color: var(--red); }
.tag-btn.active { border-color: var(--red); color: var(--red); background: rgba(255,51,51,0.1); }

.archive-list { display: flex; flex-direction: column; gap: 8px; }
.archive-item { background: var(--panel-bg); border: 1px solid var(--panel-edge); padding: 12px; clip-path: polygon(0 6px, 6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; }
.archive-item:hover { border-color: var(--red); background: rgba(255,51,51,0.05); }
.archive-icon { font-size: 1.2rem; color: var(--red); min-width: 24px; text-align: center; }
.archive-info { flex: 1; }
.archive-name { color: var(--bone); font-size: 0.78rem; margin-bottom: 4px; }
.archive-meta { color: var(--text-dim); font-size: 0.62rem; }
.archive-actions { display: flex; gap: 6px; }
.archive-btn { background: none; border: 1px solid var(--panel-edge); color: var(--text-dim); padding: 4px 8px; font-size: 0.58rem; letter-spacing: 1px; cursor: pointer; font-family: var(--font-mono); }
.archive-btn:hover { border-color: var(--red); color: var(--red); }

#preview { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; }
#preview.active { display: flex; }
#preview-close { position: absolute; top: 20px; right: 20px; background: var(--red); color: #000; padding: 8px 16px; cursor: pointer; font-weight: bold; }
#preview-content { max-width: 90%; max-height: 90%; }
#preview-content img, #preview-content video { max-width: 100%; max-height: 100%; }

.empty { color: #555; font-size: 0.75rem; text-align: center; padding: 40px 0; }
footer { margin-top: 40px; text-align: center; font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; }
</style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanline"></div>
<div id="vignette"></div>

<div class="wrap">
  <header>
    <div class="brand">UMBRELLA<span>::</span>ARCHIVES
      <small>ARCHIVES SYSTEME — DOCUMENTS / IMAGES / VIDEOS</small>
    </div>
    <div class="clearance">
      <div><span class="dot"></span><b>CONNEXION SECURISEE</b></div>
      <div>ACCES NIVEAU 5 — <span id="stamp"></span></div>
    </div>
  </header>

  <div class="toolbar">
    <input type="text" id="search" placeholder="rechercher (nom, type, date)...">
    <div class="tag-btn active" data-tag="ALL">TOUS</div>
    <div class="tag-btn" data-tag="image">IMAGE</div>
    <div class="tag-btn" data-tag="video">VIDEO</div>
    <div class="tag-btn" data-tag="document">DOCUMENT</div>
  </div>

  <div class="archive-list" id="list"></div>

  <footer>UMBRELLA CORPORATION © — <span id="count">0</span> fichiers troves</footer>
</div>

<div id="preview">
  <div id="preview-close">✕ FERMER</div>
  <div id="preview-content"></div>
</div>

<script>
const ARCHIVE_DATA = [
  { id: 'ARC-001', name: 'Security Breach Report 2026-07', type: 'document', size: '2.4 MB', date: '2026-07-06', src: '#' },
  { id: 'ARC-002', name: 'Lab Incident - Sector 7', type: 'image', size: '1.8 MB', date: '2026-07-05', src: 'https://picsum.photos/seed/arc1/600/400' },
  { id: 'ARC-003', name: 'Containment Test Video', type: 'video', size: '45.2 MB', date: '2026-07-04', src: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4' },
  { id: 'ARC-004', name: 'Personnel Evacuation Log', type: 'document', size: '560 KB', date: '2026-07-03', src: '#' },
  { id: 'ARC-005', name: 'Facility Overview', type: 'image', size: '3.2 MB', date: '2026-07-02', src: 'https://picsum.photos/seed/arc2/600/400' },
  { id: 'ARC-006', name: 'T-Virus Sample Analysis', type: 'document', size: '1.2 MB', date: '2026-07-01', src: '#' },
  { id: 'ARC-007', name: 'Underground Tunnels Map', type: 'image', size: '2.8 MB', date: '2026-06-30', src: 'https://picsum.photos/seed/arc3/600/400' },
  { id: 'ARC-008', name: 'Backup Procedures', type: 'document', size: '890 KB', date: '2026-06-29', src: '#' },
];

const listEl = document.getElementById('list');
const stamp = document.getElementById('stamp');
const countEl = document.getElementById('count');
const previewEl = document.getElementById('preview');
const previewContentEl = document.getElementById('preview-content');
const previewCloseEl = document.getElementById('preview-close');

let activeType = 'ALL';
let query = '';

function tickStamp() { stamp.textContent = new Date().toLocaleString('fr-FR'); }
setInterval(tickStamp, 1000); tickStamp();

function iconFor(type) {
  if (type === 'video') return '▶';
  if (type === 'image') return '▣';
  return '▤';
}

function render() {
  listEl.innerHTML = '';
  const filtered = ARCHIVE_DATA.filter(a => {
    const matchType = activeType === 'ALL' || a.type === activeType;
    const q = query.toLowerCase();
    const matchQuery = !q || (a.name + a.type + a.id).toLowerCase().includes(q);
    return matchType && matchQuery;
  });

  countEl.textContent = filtered.length;

  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty">Aucun fichier correspondant.</div>';
    return;
  }

  filtered.forEach(a => {
    const item = document.createElement('div');
    item.className = 'archive-item';
    item.innerHTML = `
      <div class="archive-icon">${iconFor(a.type)}</div>
      <div class="archive-info">
        <div class="archive-name">${a.name}</div>
        <div class="archive-meta">${a.id} — ${a.size} — ${a.date}</div>
      </div>
      <div class="archive-actions">
        ${a.type !== 'document' ? `<button class="archive-btn" data-preview="${a.id}">APERCU</button>` : ''}
        <button class="archive-btn" data-download="${a.id}">TELECHARGER</button>
      </div>
    `;
    listEl.appendChild(item);

    const previewBtn = item.querySelector('[data-preview]');
    if (previewBtn) {
      previewBtn.addEventListener('click', () => {
        previewContentEl.innerHTML = '';
        if (a.type === 'image') {
          const img = document.createElement('img');
          img.src = a.src;
          previewContentEl.appendChild(img);
        } else if (a.type === 'video') {
          const video = document.createElement('video');
          video.src = a.src;
          video.controls = true;
          video.autoplay = true;
          previewContentEl.appendChild(video);
        }
        previewEl.classList.add('active');
      });
    }

    const downloadBtn = item.querySelector('[data-download]');
    if (downloadBtn) {
      downloadBtn.addEventListener('click', () => {
        alert(`Telechargement de ${a.name} demarre...`);
      });
    }
  });
}

document.querySelectorAll('.tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.tag;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });

previewCloseEl.addEventListener('click', () => previewEl.classList.remove('active'));
previewEl.addEventListener('click', e => { if (e.target === previewEl) previewEl.classList.remove('active'); });

render();
</script>
</body>
</html>
