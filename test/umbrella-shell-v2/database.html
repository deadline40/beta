<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMBRELLA // BIO-ARCHIVES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap');

:root {
  --red: #ff3333; --red-dk: #200606;
  --amber: #ffaa00; --ok: #00ff00;
  --bone: #d8d2c4; --bg: #020202;
  --panel-bg: rgba(10,10,10,0.94);
  --panel-edge: #333333; --text-dim: #808080;
  --font-display: 'Orbitron', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--bone); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }
#bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,51,51,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,51,51,0.045) 1px, transparent 1px); background-size: 34px 34px; mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%); }
#scanline { position: fixed; left: 0; right: 0; height: 140px; z-index: 1; pointer-events: none; background: linear-gradient(to bottom, transparent, rgba(255,51,51,0.05), transparent); animation: sweep 8s linear infinite; }
@keyframes sweep { 0% { top: -140px; } 100% { top: 100vh; } }
#vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none; box-shadow: inset 0 0 220px rgba(0,0,0,0.85); }

.wrap { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--red); padding-bottom: 16px; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.brand { font-family: var(--font-display); font-weight: 900; font-size: 1.3rem; letter-spacing: 4px; color: var(--red); text-shadow: 0 0 12px rgba(255,51,51,0.55); }
.brand span { color: var(--amber); }
.brand small { display: block; font-family: var(--font-mono); font-weight: 400; font-size: 0.62rem; letter-spacing: 2px; color: var(--text-dim); margin-top: 4px; }
.clearance { text-align: right; font-size: 0.68rem; color: var(--text-dim); letter-spacing: 1px; }
.clearance b { color: var(--red); }
.dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--ok); margin-right:5px; box-shadow: 0 0 6px var(--ok); animation: blink 1.6s infinite; }
@keyframes blink { 50% { opacity: 0.25; } }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.card { background: var(--panel-bg); border: 1px solid var(--panel-edge); clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%); display: flex; flex-direction: column; overflow: hidden; transition: border-color .2s, box-shadow .2s; }
.card:hover { border-color: var(--red); box-shadow: 0 0 22px rgba(255,51,51,0.12); }
.card-header { background: linear-gradient(90deg, var(--red-dk), transparent); border-bottom: 1px solid var(--panel-edge); padding: 12px; }
.card-title { font-family: var(--font-display); font-size: 0.95rem; color: var(--red); margin-bottom: 4px; letter-spacing: .5px; text-shadow: 0 0 8px rgba(255,51,51,.4); }
.card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
.card-meta { font-size: 0.62rem; color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; }
.card-meta b { color: var(--bone); }
.progress-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border: 1px solid var(--panel-edge); margin: 8px 0; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--amber)); width: 0%; transition: width 0.3s; }
.threat-badge { display: inline-block; padding: 4px 8px; font-size: 0.55rem; letter-spacing: 1px; border: 1px solid currentColor; margin-top: 8px; }
.threat-high { color: var(--red); }
.threat-critical { color: #ff0000; animation: blink 0.8s infinite; }
.threat-low { color: var(--ok); }

.empty { color: #555; font-size: 0.75rem; grid-column: 1/-1; text-align: center; padding: 40px 0; }
footer { margin-top: 40px; text-align: center; font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; }
</style>
</head>
<body>

<div id="bg-grid"></div>
<div id="scanline"></div>
<div id="vignette"></div>

<div class="wrap">
  <header>
    <div class="brand">UMBRELLA<span>::</span>BIO-ARCHIVES
      <small>PROJETS BIOLOGIQUES — SURVEILLANCE DE CONFINEMENT</small>
    </div>
    <div class="clearance">
      <div><span class="dot"></span><b>CONNEXION SECURISEE</b></div>
      <div>ACCES NIVEAU 5 — <span id="stamp"></span></div>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>UMBRELLA CORPORATION © — donnees en temps reel mises a jour toutes les 30 secondes</footer>
</div>

<script>
const BIO_DATA = [
  { id: 'BIO-001', project: "T-VIRUS",       status: "STABLE",     load: 94, temp: 4.2,  location: "Underground Vault",   threat: "HIGH",     containment: true },
  { id: 'BIO-002', project: "NE-ALPHA",      status: "IN CUSTODY", load: 42, temp: -18.5, location: "Holding Cell 3",      threat: "CRITICAL", containment: true },
  { id: 'BIO-003', project: "REPLIT-AGENTS", status: "COMPILING",  load: 68, temp: 21.0, location: "Cybernetics Division", threat: "LOW",      containment: false },
  { id: 'BIO-004', project: "G-VIRUS",       status: "QUARANTINE", load: 88, temp: 7.1,  location: "Quarantine Bay 12",   threat: "CRITICAL", containment: true },
];

const grid = document.getElementById('grid');
const stamp = document.getElementById('stamp');

function tickStamp() { stamp.textContent = new Date().toLocaleString('fr-FR'); }
setInterval(tickStamp, 1000); tickStamp();

function threatColor(threat) {
  if (threat === 'CRITICAL') return '#ff0000';
  if (threat === 'HIGH') return 'var(--red)';
  return 'var(--ok)';
}

function render() {
  grid.innerHTML = '';
  BIO_DATA.forEach(bio => {
    const card = document.createElement('div');
    card.className = 'card';
    
    card.innerHTML = `
      <div class="card-header">
        <div class="card-title">${bio.project}</div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <b>ID:</b> ${bio.id}<br>
          <b>LOCATION:</b> ${bio.location}<br>
          <b>STATUS:</b> <span style="color:${bio.status === 'STABLE' ? 'var(--ok)' : bio.status === 'QUARANTINE' ? 'var(--amber)' : 'var(--red)'}">${bio.status}</span>
        </div>
        
        <div style="margin-top: auto;">
          <div style="font-size:0.62rem; color:var(--text-dim); margin-bottom:4px;">TEMPERATURE:</div>
          <div style="color:var(--bone); font-size:0.75rem; margin-bottom:8px;">${bio.temp}°C</div>
          
          <div style="font-size:0.62rem; color:var(--text-dim); margin-bottom:4px;">CONTAINMENT INTEGRITY:</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${bio.load}%; background: ${threatColor(bio.threat)};"></div>
          </div>
          <div style="font-size:0.65rem; color:var(--text-dim);">${bio.load}%</div>
          
          <span class="threat-badge threat-${bio.threat.toLowerCase()}" style="color:${threatColor(bio.threat)};border-color:${threatColor(bio.threat)}">${bio.threat}</span>
          <span class="threat-badge" style="color:#666;border-color:#333">${bio.containment ? 'CONTAINED' : 'UNCONTAINED'}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

setInterval(() => {
  BIO_DATA.forEach(b => {
    b.load = Math.min(100, Math.max(10, b.load + Math.floor((Math.random() - 0.5) * 5)));
    b.temp += (Math.random() - 0.5) * 0.4;
  });
  render();
}, 2000);

render();
</script>
</body>
</html>
