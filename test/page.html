<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GEOSPATIAL TRACKING</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    body {
      margin: 0;
      background: #001a00;
      color: #00ff41;
      font-family: 'VT323', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hud {
      width: 1100px;
      height: 620px;
      border: 3px solid #00ff41;
      background: rgba(0, 20, 0, 0.95);
      position: relative;
      box-shadow: 0 0 60px #00ff41;
      overflow: hidden;
    }
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(#00ff41 1px, transparent 1px),
        linear-gradient(90deg, #00ff41 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
      z-index: 1;
    }
    .map {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      filter: brightness(1.3) contrast(1.4) hue-rotate(80deg);
      z-index: 2;
      opacity: 0.9;
    }
    .clock {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: #000;
      padding: 8px 30px;
      border: 2px solid #00ff41;
      font-size: 42px;
      letter-spacing: 6px;
      box-shadow: 0 0 20px #00ff41;
      z-index: 3;
    }
    .coords {
      position: absolute;
      bottom: 40px;
      left: 40px;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border: 1px solid #00ff41;
      z-index: 3;
    }
    .target {
      position: absolute;
      bottom: 40px;
      right: 40px;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border: 1px solid #ff0044;
      color: #ff6666;
      z-index: 3;
    }
  </style>
</head>
<body>

<div class="hud">
  <div class="grid"></div>
  
  <!-- Carte du monde -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2e/World_map_blank_without_borders.svg/1280px-World_map_blank_without_borders.svg.png" 
       class="map" alt="World Map">

  <!-- Horloge -->
  <div class="clock" id="clock">73:59:47:80</div>

  <!-- Coordonnées -->
  <div class="coords">
    LAT: <span id="lat">-18.472</span><br>
    LONG: <span id="lon">47.318</span><br>
    ALT: 847m
  </div>

  <!-- Target -->
  <div class="target">
    <strong>TARGET ACQUIRED</strong><br>
    B.O.W-047 "LICKER"<br>
    STATUS: <span style="color:#ff0044;">LOCKED</span>
  </div>
</div>

<script>
// Horloge digitale
function updateClock() {
  const clock = document.getElementById('clock');
  let time = 73594780;
  
  setInterval(() => {
    time += 10;
    let str = time.toString().padStart(8, '0');
    clock.textContent = str.slice(0,2) + ":" + str.slice(2,4) + ":" + str.slice(4,6) + ":" + str.slice(6,8);
  }, 80);
}
updateClock();

// Coordonnées qui bougent légèrement
setInterval(() => {
  const lat = (-18.47 - Math.random() * 0.05).toFixed(3);
  const lon = (47.31 + Math.random() * 0.05).toFixed(3);
  document.getElementById('lat').textContent = lat;
  document.getElementById('lon').textContent = lon;
}, 1200);
</script>

</body>
</html>
