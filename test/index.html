<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATRIX // TEMPLATE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');

/* ============================================================
   VARIABLES & BASE
   ============================================================ */
:root {
  --green:     #00ff41;
  --green-dim: #00aa2a;
  --green-dk:  #003300;
  --red:       #ff003c;
  --bg:        #000000;
  --win-bg:    rgba(0, 8, 0, 0.88);
  --border:    #003300;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Share Tech Mono', monospace;
  color: var(--green);
  height: 100vh;
  overflow: hidden;
}

/* ============================================================
   CANVAS MATRIX FOND
   ============================================================ */
#matrix-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
}

/* ============================================================
   LAYOUT PRINCIPAL
   ============================================================ */
#layout {
  position: relative;
  z-index: 1;
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-columns: 1fr 320px;
  grid-template-rows: 1fr 220px;
  gap: 10px;
  padding: 10px;
}

/* ============================================================
   FENÊTRES TERMINAL GÉNÉRIQUES
   ============================================================ */
.win {
  background: var(--win-bg);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,255,65,0.05);
  transition: box-shadow 0.3s;
}

.win:hover {
  box-shadow: 0 0 25px rgba(0,255,65,0.15);
  border-color: var(--green-dim);
}

/* Barre de titre de chaque fenêtre */
.win-title {
  background: var(--green-dk);
  padding: 5px 12px;
  font-size: 0.7rem;
  letter-spacing: 2px;
  color: var(--green);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  user-select: none;
}

.win-title span { color: var(--red); }

.win-body {
  flex: 1;
  overflow: hidden;
  padding: 10px;
  position: relative;
}

/* ============================================================
   FENÊTRE 1 — TERMINAL INTERACTIF (haut gauche)
   ============================================================ */
#win-terminal {
  grid-column: 1;
  grid-row: 1;
}

#terminal-output {
  height: calc(100% - 36px);
  overflow-y: auto;
  font-size: 0.8rem;
  line-height: 1.6;
  padding-bottom: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--green-dim) transparent;
}

#terminal-output::-webkit-scrollbar { width: 4px; }
#terminal-output::-webkit-scrollbar-thumb { background: var(--green-dk); }

.t-line { margin-bottom: 2px; }
.t-line.cmd { color: var(--green); }
.t-line.res { color: var(--green-dim); padding-left: 1rem; }
.t-line.err { color: var(--red); padding-left: 1rem; }
.t-line.sys { color: #005500; font-size: 0.72rem; }

/* Ligne de saisie */
#terminal-input-line {
  display: flex;
  align-items: center;
  gap: 6px;
  border-top: 1px solid var(--border);
  padding-top: 6px;
  margin-top: 6px;
  flex-shrink: 0;
}

#terminal-prompt-label {
  color: var(--red);
  font-size: 0.8rem;
  white-space: nowrap;
}

#terminal-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  caret-color: var(--green);
}

/* ============================================================
   FENÊTRE 2 — GALERIE D'IMAGES (bas gauche)
   ============================================================ */
#win-images {
  grid-column: 1;
  grid-row: 2;
}

#gallery {
  display: flex;
  gap: 10px;
  height: 100%;
  align-items: center;
  overflow-x: auto;
  padding: 5px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--green-dk) transparent;
}

.img-slot {
  flex-shrink: 0;
  width: 160px;
  height: 140px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  background: #000;
  transition: border-color 0.2s;
}

.img-slot:hover { border-color: var(--green); }

.img-slot img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  /* Filtre vert Matrix sur toutes les images */
  filter: sepia(1) hue-rotate(85deg) saturate(1.5) brightness(0.75);
  transition: filter 0.3s;
}

.img-slot:hover img {
  filter: sepia(1) hue-rotate(85deg) saturate(2) brightness(0.9);
}

.img-slot .img-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.7);
  color: var(--green-dim);
  font-size: 0.65rem;
  padding: 3px 6px;
  letter-spacing: 1px;
  border-top: 1px solid var(--border);
}

/* Slot vide (placeholder) */
.img-slot.empty {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--green-dk);
  font-size: 0.7rem;
  letter-spacing: 1px;
  border-style: dashed;
}

/* ============================================================
   FENÊTRE 3 — DÉFILEMENT MACHINE À ÉCRIRE (droite)
   ============================================================ */
#win-scroll {
  grid-column: 2;
  grid-row: 1 / 3;
}

#scroll-feed {
  height: 100%;
  overflow: hidden;
  font-size: 0.72rem;
  line-height: 1.7;
  position: relative;
}

.feed-line {
  display: block;
  color: var(--green-dim);
  margin-bottom: 4px;
  white-space: pre-wrap;
  word-break: break-all;
}

.feed-line.highlight { color: var(--green); }
.feed-line.alert     { color: var(--red); }
.feed-line.dim       { color: #004400; }
</style>
</head>
<body>

<!-- CANVAS FOND MATRIX -->
<canvas id="matrix-bg"></canvas>

<!-- LAYOUT 3 FENÊTRES -->
<div id="layout">

  <!-- FENÊTRE 1 : Terminal interactif -->
  <div class="win" id="win-terminal">
    <div class="win-title">
      <span>root@matrix</span>:~/terminal
      <span>[ █ ]</span>
    </div>
    <div class="win-body" style="display:flex;flex-direction:column;">
      <div id="terminal-output"></div>
      <div id="terminal-input-line">
        <span id="terminal-prompt-label">root@matrix:~$</span>
        <input id="terminal-input" type="text" autocomplete="off" spellcheck="false" placeholder="entrez une commande...">
      </div>
    </div>
  </div>

  <!-- FENÊTRE 2 : Galerie images -->
  <div class="win" id="win-images">
    <div class="win-title">
      <span>root@matrix</span>:~/images — <span style="color:var(--green-dim)">ls -la ./gallery</span>
      <span>[ █ ]</span>
    </div>
    <div class="win-body">
      <div id="gallery">

        <!-- Remplace src par tes vraies images -->
        <div class="img-slot">
          <img src="https://picsum.photos/seed/matrix1/300/200" alt="img1">
          <div class="img-label">> img_001.jpg</div>
        </div>
        <div class="img-slot">
          <img src="https://picsum.photos/seed/matrix2/300/200" alt="img2">
          <div class="img-label">> img_002.jpg</div>
        </div>
        <div class="img-slot">
          <img src="https://picsum.photos/seed/matrix3/300/200" alt="img3">
          <div class="img-label">> img_003.jpg</div>
        </div>
        <div class="img-slot">
          <img src="https://picsum.photos/seed/matrix4/300/200" alt="img4">
          <div class="img-label">> img_004.jpg</div>
        </div>

        <!-- Slots vides — remplace par de vraies images -->
        <div class="img-slot empty">[ VIDE ]</div>
        <div class="img-slot empty">[ VIDE ]</div>

      </div>
    </div>
  </div>

  <!-- FENÊTRE 3 : Défilement machine à écrire -->
  <div class="win" id="win-scroll">
    <div class="win-title">
      <span>root@matrix</span>:~/stream
      <span>[ █ ]</span>
    </div>
    <div class="win-body">
      <div id="scroll-feed"></div>
    </div>
  </div>

</div>

<script>
/* ============================================================
   1. CANVAS MATRIX FOND
   ============================================================ */
const canvas = document.getElementById('matrix-bg');
const ctx    = canvas.getContext('2d');

canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  initDrops();
});

const CHARS   = '01アイウエオカキクケコサシスセソタチツテト MATRIX SYSTEM ACCESS GRANTED IHONTY';
const FS      = 13;
let   drops   = [];

function initDrops() {
  drops = Array(Math.floor(canvas.width / FS)).fill(0);
}
initDrops();

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = FS + 'px Share Tech Mono, monospace';
  drops.forEach((y, i) => {
    const c = CHARS[Math.floor(Math.random() * CHARS.length)];
    ctx.fillStyle = y <= 1 ? '#ccffcc' : '#00ff41';
    ctx.fillText(c, i * FS, y * FS);
    if (y * FS > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 33);


/* ============================================================
   2. TERMINAL INTERACTIF
   ============================================================ */
const output    = document.getElementById('terminal-output');
const input     = document.getElementById('terminal-input');
const history   = [];
let   histIdx   = -1;

/* Commandes disponibles */
const COMMANDS = {
  help: () => [
    { t: 'res', v: 'Commandes disponibles :' },
    { t: 'res', v: '  help      — affiche cette aide' },
    { t: 'res', v: '  clear     — efface le terminal' },
    { t: 'res', v: '  whoami    — identité système' },
    { t: 'res', v: '  ls        — liste les fichiers' },
    { t: 'res', v: '  date      — date et heure système' },
    { t: 'res', v: '  matrix    — message du système' },
    { t: 'res', v: '  pwd       — répertoire courant' },
  ],
  clear: () => { output.innerHTML = ''; return []; },
  whoami: () => [{ t: 'res', v: 'ihonty // développeur web & réseaux' }],
  pwd:    () => [{ t: 'res', v: '/home/ihonty/matrix-template' }],
  date:   () => [{ t: 'res', v: new Date().toLocaleString('fr-FR') }],
  ls:     () => [
    { t: 'res', v: 'drwxr-xr-x  index.html' },
    { t: 'res', v: 'drwxr-xr-x  cv.html' },
    { t: 'res', v: 'drwxr-xr-x  projects.html' },
    { t: 'res', v: 'drwxr-xr-x  blog.html' },
    { t: 'res', v: 'drwxr-xr-x  contact.html' },
    { t: 'res', v: '-rw-r--r--  style.css' },
    { t: 'res', v: '-rw-r--r--  script.js' },
  ],
  matrix: () => [
    { t: 'sys', v: '> WAKE UP, NEO...' },
    { t: 'sys', v: '> THE MATRIX HAS YOU.' },
    { t: 'sys', v: '> FOLLOW THE WHITE RABBIT.' },
    { t: 'alert', v: '> KNOCK KNOCK.' },
  ],
};

function addLine(type, text) {
  const div = document.createElement('div');
  div.className = 't-line ' + type;
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function runCommand(cmd) {
  const trimmed = cmd.trim().toLowerCase();
  addLine('cmd', 'root@matrix:~$ ' + cmd);
  if (!trimmed) return;
  history.unshift(cmd);
  histIdx = -1;

  if (COMMANDS[trimmed]) {
    const lines = COMMANDS[trimmed]();
    lines.forEach(l => addLine(l.t, l.v));
  } else {
    addLine('err', 'commande introuvable : ' + trimmed + ' — tapez "help"');
  }
}

/* Boot initial */
[
  { t: 'sys', v: '> MATRIX TERMINAL v2.0 — INITIALISÉ' },
  { t: 'sys', v: '> CONNEXION ÉTABLIE — ' + new Date().toLocaleString('fr-FR') },
  { t: 'sys', v: '> Tapez "help" pour la liste des commandes.' },
  { t: 'sys', v: '─────────────────────────────────────────' },
].forEach(l => addLine(l.t, l.v));

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    runCommand(input.value);
    input.value = '';
  }
  /* Navigation historique avec flèches */
  if (e.key === 'ArrowUp') {
    if (histIdx < history.length - 1) histIdx++;
    input.value = history[histIdx] || '';
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    if (histIdx > 0) histIdx--;
    input.value = history[histIdx] || '';
    e.preventDefault();
  }
});

/* Focus automatique sur le terminal */
input.focus();
document.addEventListener('click', () => input.focus());


/* ============================================================
   3. DÉFILEMENT MACHINE À ÉCRIRE (panneau droit)
   ============================================================ */
const feed = document.getElementById('scroll-feed');

const FEED_LINES = [
  { t: 'highlight', v: '> SYSTEM BOOT SEQUENCE COMPLETE' },
  { t: 'dim',       v: '> loading kernel modules...' },
  { t: 'dim',       v: '> mounting filesystem...' },
  { t: 'feed-line', v: '> network interface UP' },
  { t: 'alert',     v: '> WARNING: unrecognized packet' },
  { t: 'dim',       v: '> scanning ports 0-65535...' },
  { t: 'feed-line', v: '> port 80   — HTTP     OPEN' },
  { t: 'feed-line', v: '> port 443  — HTTPS    OPEN' },
  { t: 'dim',       v: '> port 22   — SSH      FILTERED' },
  { t: 'highlight', v: '> ACCESS GRANTED — USER: ihonty' },
  { t: 'dim',       v: '> loading user profile...' },
  { t: 'feed-line', v: '> HTML/CSS    [██████████] 100%' },
  { t: 'feed-line', v: '> JavaScript  [████████░░]  80%' },
  { t: 'feed-line', v: '> Bootstrap   [█████████░]  90%' },
  { t: 'feed-line', v: '> Python      [███████░░░]  70%' },
  { t: 'feed-line', v: '> React       [██████░░░░]  60%' },
  { t: 'alert',     v: '> INTRUSION ATTEMPT DETECTED' },
  { t: 'dim',       v: '> activating countermeasures...' },
  { t: 'highlight', v: '> THREAT NEUTRALIZED' },
  { t: 'dim',       v: '> running diagnostics...' },
  { t: 'feed-line', v: '> CPU    : 12%' },
  { t: 'feed-line', v: '> RAM    : 2.1GB / 8GB' },
  { t: 'feed-line', v: '> UPTIME : 99.9%' },
  { t: 'highlight', v: '> ALL SYSTEMS NOMINAL' },
  { t: 'dim',       v: '> resuming matrix protocol...' },
  { t: 'alert',     v: '> THE MATRIX HAS YOU.' },
];

let feedIdx  = 0;
let charIdx  = 0;
let currentEl = null;

function typeNextChar() {
  /* Si on a terminé toutes les lignes, on recommence */
  if (feedIdx >= FEED_LINES.length) {
    feedIdx = 0;
    /* Supprime les premières lignes si trop nombreuses (scroll infini) */
    while (feed.children.length > 40) feed.removeChild(feed.firstChild);
  }

  /* Nouvelle ligne */
  if (charIdx === 0) {
    currentEl = document.createElement('span');
    currentEl.className = 'feed-line ' + FEED_LINES[feedIdx].t;
    feed.appendChild(currentEl);
  }

  const line = FEED_LINES[feedIdx].v;
  currentEl.textContent += line[charIdx];
  charIdx++;

  if (charIdx >= line.length) {
    /* Ligne terminée */
    feed.appendChild(document.createElement('br'));
    feedIdx++;
    charIdx = 0;
    /* Petite pause entre les lignes */
    setTimeout(typeLoop, Math.random() * 400 + 100);
  } else {
    /* Vitesse de frappe variable pour effet naturel */
    setTimeout(typeLoop, Math.random() * 30 + 15);
  }
}

function typeLoop() { typeNextChar(); }
setTimeout(typeLoop, 800);
</script>
</body>
</html>
