<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMBRELLA // SYSTEM SHELL</title>

  <!-- Bootstrap (à garder si tu veux ses utilitaires, même en mode shell) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/terminal.css">
  <link rel="stylesheet" href="css/windows.css">
  <link rel="stylesheet" href="css/theme-umbrella.css">
</head>
<body>

  <!-- Zone où les fenêtres des apps vont s'ouvrir -->
  <div id="desktop"></div>

  <!-- Le terminal, toujours visible -->
  <div id="terminal">
    <div id="terminal-output"></div>
    <div id="terminal-input-line">
      <span id="terminal-prompt">umbrella&gt;</span>
      <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
